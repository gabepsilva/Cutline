name: Security

on:
  pull_request:
  push:
    branches: [master]
  workflow_dispatch:
  schedule:
    # Weekly full-history secret scan (Sunday 03:00 UTC)
    - cron: '0 3 * * 0'

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gitleaks:
    name: Secret scanning
    timeout-minutes: 15
    runs-on: ${{ (github.event_name == 'push' || github.event_name == 'schedule' || github.event.pull_request.head.repo.full_name == github.repository) && fromJSON('["self-hosted", "Linux", "X64"]') || 'ubuntu-latest' }}
    steps:
      - name: Checkout
        uses: actions/checkout@b9e0990d219a03df7633c93f6f005a8fecbcab22 # v4.2.2
        with:
          fetch-depth: 0

      - name: Gitleaks
        env:
          GITLEAKS_CONFIG: .gitleaks.toml
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_EVENT_BEFORE: ${{ github.event.before }}
          GITHUB_PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GITHUB_PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: bash scripts/ci/gitleaks.sh

  dependency-audit:
    name: Dependency audit
    timeout-minutes: 15
    runs-on: ${{ (github.event_name == 'push' || github.event_name == 'schedule' || github.event.pull_request.head.repo.full_name == github.repository) && fromJSON('["self-hosted", "Linux", "X64"]') || 'ubuntu-latest' }}
    steps:
      - name: Checkout
        uses: actions/checkout@b9e0990d219a03df7633c93f6f005a8fecbcab22 # v4.2.2

      - name: Setup Bun
        uses: ./.github/actions/bun-ci

      - name: bun audit (high/critical)
        run: bash scripts/ci/audit-deps.sh

      - name: OSV-Scanner (high/critical)
        run: bash scripts/ci/osv-scan.sh

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    timeout-minutes: 10
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@b9e0990d219a03df7633c93f6f005a8fecbcab22 # v4.2.2

      - name: Dependency review
        uses: actions/dependency-review-action@dcd589ca9f7a6ded22e224ca2e288beb6bf9846b # v4.5.0
        with:
          fail-on-severity: high
          deny-licenses: GPL-2.0, GPL-3.0, AGPL-3.0, LGPL-2.0, LGPL-2.1, LGPL-3.0
