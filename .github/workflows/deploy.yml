name: Deploy

# Continuous delivery to the tk8s cluster (T-12 → T-13 GitOps). On merge to master:
# build the image, scan it (gate), push to GHCR with a build-provenance attestation,
# pin the prod image tag onto the CI-managed `deploy/prod` branch, then wait for Argo
# CD to sync that revision (PreSync migrate → Deployment rollout) and verify the route.
# `master` stays review-gated — CI only force-pushes the unprotected `deploy/prod`.
# Production rollout is master-only; PRs never deploy.

on:
  push:
    branches: [master]
    paths:
      - 'src/**'
      - 'static/**'
      - 'drizzle/**'
      - 'scripts/migrate.mjs'
      - 'Dockerfile'
      - 'docker-entrypoint.sh'
      - 'package.json'
      - 'bun.lock'
      - 'bunfig.toml'
      - 'vite.config.ts'
      - 'infra/k8s/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  id-token: write # mint the OIDC token for build-provenance attestation
  attestations: write # write the attestation to the GHCR package

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Build, push & roll out
    timeout-minutes: 30
    # Self-hosted runner has kubectl access to tk8s; deploy triggers are trusted refs only.
    runs-on: [self-hosted, Linux, X64]
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/cutline
      ARGO_APP: cutline-prod
      DEPLOY_BRANCH: deploy/prod
      NAMESPACE: cutline
      INGRESS: cutline
      HOST: cutline.i.psilva.org
    steps:
      - name: Checkout
        uses: actions/checkout@b9e0990d219a03df7633c93f6f005a8fecbcab22 # v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image tags
        run: |
          set -eu
          DATE_TAG="${IMAGE_NAME}:$(date -u +'%Y-%m-%d')_${GITHUB_RUN_NUMBER}"
          {
            echo "DATE_TAG=${DATE_TAG}"
            echo "LATEST_TAG=${IMAGE_NAME}:latest"
            echo "IMAGE_TAG=${DATE_TAG##*:}"
          } >> "$GITHUB_ENV"

      - name: Log in to GitHub Container Registry
        run: |
          set -eu
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build image
        run: |
          set -eu
          docker build --provenance=false --sbom=false \
            -t "$DATE_TAG" -t "$LATEST_TAG" .

      # Gate the rollout on the image we actually ship: nothing is pushed or
      # deployed if the built image has a fixable HIGH/CRITICAL vulnerability.
      - name: Trivy image scan (gate)
        uses: aquasecurity/trivy-action@cf5c088a69634cd13ccddc735d7926162c31f9a6 # v0.28.0
        with:
          scan-type: image
          image-ref: ${{ env.DATE_TAG }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1

      - name: Push image
        run: |
          set -eu
          docker push "$DATE_TAG"
          docker push "$LATEST_TAG"
          # Capture the pushed manifest digest for the provenance attestation.
          digest="$(docker inspect --format='{{index .RepoDigests 0}}' "$DATE_TAG" | cut -d@ -f2)"
          echo "IMAGE_DIGEST=${digest}" >> "$GITHUB_ENV"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ env.IMAGE_NAME }}
          subject-digest: ${{ env.IMAGE_DIGEST }}
          push-to-registry: true

      - name: Pin prod image tag on deploy branch (GitOps)
        run: |
          set -eu
          KUSTOMIZE_FILE=infra/k8s/overlays/prod/kustomization.yaml
          sed -i "s|newTag: .*|newTag: ${IMAGE_TAG}|" "$KUSTOMIZE_FILE"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # deploy/prod is a CI-managed pointer branch: the triggering master commit
          # plus the pinned image tag. `master` stays review-gated; Argo tracks this.
          git checkout -B "$DEPLOY_BRANCH"
          git add "$KUSTOMIZE_FILE"
          git commit -m "deploy: pin prod image to ${IMAGE_TAG}"
          git push --force origin "$DEPLOY_BRANCH"
          echo "DEPLOY_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Wait for Argo CD sync
        run: |
          set -eu
          # Nudge Argo to pick up the new commit now instead of at the next reconcile,
          # then gate on the *pushed* revision actually syncing — not stale status from
          # a previous sync (which would still read Synced/Healthy on the old image).
          kubectl -n argocd annotate application "$ARGO_APP" \
            argocd.argoproj.io/refresh=hard --overwrite >/dev/null
          deadline=$((SECONDS + 600))
          while [ "$SECONDS" -lt "$deadline" ]; do
            revision="$(kubectl -n argocd get application "$ARGO_APP" -o jsonpath='{.status.sync.revision}' 2>/dev/null || true)"
            sync="$(kubectl -n argocd get application "$ARGO_APP" -o jsonpath='{.status.sync.status}' 2>/dev/null || true)"
            health="$(kubectl -n argocd get application "$ARGO_APP" -o jsonpath='{.status.health.status}' 2>/dev/null || true)"
            phase="$(kubectl -n argocd get application "$ARGO_APP" -o jsonpath='{.status.operationState.phase}' 2>/dev/null || true)"
            echo "Argo CD ${ARGO_APP}: revision=${revision:0:7} sync=${sync:-Unknown} health=${health:-Unknown} op=${phase:-Unknown}"
            if [ "$revision" = "$DEPLOY_SHA" ] && [ "$sync" = "Synced" ] && [ "$health" = "Healthy" ] && [ "$phase" = "Succeeded" ]; then
              echo "OK: ${ARGO_APP} synced ${DEPLOY_SHA} (Synced + Healthy)"
              exit 0
            fi
            sleep 10
          done
          echo "Timed out waiting for ${ARGO_APP} to sync ${DEPLOY_SHA} (Synced + Healthy)" >&2
          kubectl -n argocd get application "$ARGO_APP" -o yaml >&2 || true
          exit 1

      - name: Verify route
        run: |
          set -eu
          ingress_ip="$(kubectl -n "$NAMESPACE" get ingress "$INGRESS" -o jsonpath='{.status.loadBalancer.ingress[0].ip}')"
          if [ -z "$ingress_ip" ]; then
            echo "Ingress ${NAMESPACE}/${INGRESS} has no load balancer IP yet." >&2
            exit 1
          fi
          curl -fsS --resolve "${HOST}:443:${ingress_ip}" "https://${HOST}/healthz" >/dev/null
          echo "OK: https://${HOST}/healthz reachable via ${ingress_ip}"
