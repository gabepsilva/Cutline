name: Deploy

# Build-once, deploy-to-staging (issue #216). On merge to master: build a versioned
# image artifact, scan it (gate), push to GHCR with provenance, pin that tag onto
# the CI-managed `deploy/stag` branch, then wait for Argo CD `cutline-stag` to sync
# and verify https://cutline-stag.i.psilva.org/healthz.
# Production is promoted manually via `.github/workflows/promote.yml` (same artifact).

on:
  push:
    branches: [master]
    paths:
      - 'src/**'
      - 'static/**'
      - 'drizzle/**'
      - 'scripts/migrate.mjs'
      - 'Dockerfile'
      - 'docker-entrypoint.sh'
      - 'package.json'
      - 'bun.lock'
      - 'bunfig.toml'
      - 'vite.config.ts'
      - 'infra/k8s/**'
      - '.github/workflows/deploy.yml'
      - '.github/workflows/promote.yml'
      - '.github/actions/argo-rollout/**'
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

concurrency:
  group: deploy-stag-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-stag:
    name: Build artifact & deploy staging
    timeout-minutes: 30
    runs-on: [self-hosted, Linux, X64]
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/cutline
      HOST: cutline-stag.i.psilva.org
    steps:
      - name: Checkout
        uses: actions/checkout@b9e0990d219a03df7633c93f6f005a8fecbcab22 # v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image tags
        run: |
          set -eu
          DATE_TAG="${IMAGE_NAME}:$(date -u +'%Y-%m-%d')_${GITHUB_RUN_NUMBER}"
          {
            echo "DATE_TAG=${DATE_TAG}"
            echo "LATEST_TAG=${IMAGE_NAME}:latest"
            echo "IMAGE_TAG=${DATE_TAG##*:}"
          } >> "$GITHUB_ENV"

      - name: Log in to GitHub Container Registry
        run: |
          set -eu
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build image
        run: |
          set -eu
          docker build --provenance=false --sbom=false \
            -t "$DATE_TAG" -t "$LATEST_TAG" .

      - name: Trivy image scan (gate)
        uses: aquasecurity/trivy-action@cf5c088a69634cd13ccddc735d7926162c31f9a6 # v0.28.0
        with:
          scan-type: image
          image-ref: ${{ env.DATE_TAG }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1

      - name: Push image
        run: |
          set -eu
          docker push "$DATE_TAG"
          docker push "$LATEST_TAG"
          digest="$(docker inspect --format='{{index .RepoDigests 0}}' "$DATE_TAG" | cut -d@ -f2)"
          echo "IMAGE_DIGEST=${digest}" >> "$GITHUB_ENV"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-name: ${{ env.IMAGE_NAME }}
          subject-digest: ${{ env.IMAGE_DIGEST }}
          push-to-registry: true

      - name: Roll out to staging
        uses: ./.github/actions/argo-rollout
        with:
          argo-app: cutline-stag
          deploy-branch: deploy/stag
          kustomize-file: infra/k8s/overlays/stag/kustomization.yaml
          image-tag: ${{ env.IMAGE_TAG }}
          pin-commit-message: 'deploy: pin stag image to ${{ env.IMAGE_TAG }}'
          namespace: cutline-stag
          host: cutline-stag.i.psilva.org

      - name: Deployment summary
        run: |
          {
            echo "### Staging deploy"
            echo "- **Artifact:** \`${IMAGE_NAME}:${IMAGE_TAG}\`"
            echo "- **Digest:** \`${IMAGE_DIGEST}\`"
            echo "- **URL:** https://${HOST}"
            echo ""
            echo "Promote to prod: Actions → **Promote** → \`${IMAGE_TAG}\` (or leave blank for current staging)."
          } >> "$GITHUB_STEP_SUMMARY"
