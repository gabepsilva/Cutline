name: CI

on:
  pull_request:
  push:
    branches: [master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Code quality
    timeout-minutes: 30
    runs-on: ${{ (github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository) && fromJSON('["self-hosted", "Linux", "X64"]') || 'ubuntu-latest' }}
    steps:
      - name: Checkout
        uses: actions/checkout@b9e0990d219a03df7633c93f6f005a8fecbcab22 # v4.2.2

      - name: Setup Bun
        uses: ./.github/actions/bun-ci
        with:
          playwright-cache: 'true'

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run check

      - name: Install Playwright
        run: bunx playwright install --with-deps chromium

      - name: Unit and component tests
        run: bun run test:unit -- --run

      - name: E2E tests
        run: bunx playwright test

  coverage:
    name: Coverage
    timeout-minutes: 30
    runs-on: ${{ (github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository) && fromJSON('["self-hosted", "Linux", "X64"]') || 'ubuntu-latest' }}
    steps:
      - name: Checkout
        uses: actions/checkout@b9e0990d219a03df7633c93f6f005a8fecbcab22 # v4.2.2

      - name: Setup Bun
        uses: ./.github/actions/bun-ci
        with:
          playwright-cache: 'true'

      - name: Install Playwright
        run: bunx playwright install chromium

      - name: Coverage
        run: bun run test:unit:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4.6.0
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14
