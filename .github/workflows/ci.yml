name: CI

on:
  pull_request:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Code quality
    if: ${{ github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]') }}
    timeout-minutes: 7
    runs-on: ${{ (github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository) && fromJSON('["self-hosted", "Linux", "X64"]') || 'ubuntu-latest' }}
    steps:
      - name: Checkout
        uses: actions/checkout@b9e0990d219a03df7633c93f6f005a8fecbcab22 # v4.2.2

      - name: Setup Bun
        uses: ./.github/actions/bun-ci
        with:
          playwright-cache: 'true'

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run check

      - name: Install Playwright
        run: bunx playwright install --with-deps chromium

      - name: Unit and component tests
        # Normally ~45s. scripts/ci/test-unit.sh adds a hard timeout if Vitest stalls.
        timeout-minutes: 2.5
        run: bash scripts/ci/test-unit.sh

      - name: E2E tests
        # Normally ~25s. Cap so a stuck Playwright run fails fast.
        timeout-minutes: 4
        env:
          DATABASE_URL: file:./ci-e2e.db
          ORIGIN: http://localhost:4173
        run: |
          rm -f ci-e2e.db
          export BETTER_AUTH_SECRET="$(openssl rand -hex 16)"
          bun scripts/e2e-setup.ts
          bunx playwright test

  coverage:
    name: Coverage
    timeout-minutes: 7
    runs-on: ${{ (github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository) && fromJSON('["self-hosted", "Linux", "X64"]') || 'ubuntu-latest' }}
    steps:
      - name: Checkout
        uses: actions/checkout@b9e0990d219a03df7633c93f6f005a8fecbcab22 # v4.2.2

      - name: Setup Bun
        uses: ./.github/actions/bun-ci
        with:
          playwright-cache: 'true'

      - name: Install Playwright
        run: bunx playwright install chromium

      - name: Coverage
        # Normally ~45s. Same hard-timeout guard as the unit step.
        timeout-minutes: 3
        run: bash scripts/ci/test-unit.sh --run --coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4.6.0
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14
