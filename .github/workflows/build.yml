name: Build

on:
  pull_request:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build verify
    timeout-minutes: 7
    env:
      DATABASE_URL: file:./ci-build.db
    runs-on: ${{ (github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository) && fromJSON('["self-hosted", "Linux", "X64"]') || 'ubuntu-latest' }}
    steps:
      - name: Checkout
        uses: actions/checkout@b9e0990d219a03df7633c93f6f005a8fecbcab22 # v4.2.2

      - name: Setup Bun
        uses: ./.github/actions/bun-ci

      - name: Build
        run: BETTER_AUTH_SECRET="$(openssl rand -hex 16)" bun run build

      - name: Upload build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4.6.0
        with:
          name: sveltekit-build
          path: .svelte-kit/output/
          retention-days: 7

      - name: Generate SBOM
        uses: anchore/sbom-action@ebc589279e38b47d3fd59477724ebf60f3fea8f7 # v0.17.10
        with:
          path: .
          format: cyclonedx-json
          output-file: sbom.cyclonedx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v4.6.0
        with:
          name: sbom
          path: sbom.cyclonedx.json
          retention-days: 30

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@cf5c088a69634cd13ccddc735d7926162c31f9a6 # v0.28.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 1

      - name: Trivy config scan
        uses: aquasecurity/trivy-action@cf5c088a69634cd13ccddc735d7926162c31f9a6 # v0.28.0
        with:
          scan-type: config
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 1

      # Container/release path — active now that a Dockerfile exists.
      - name: Build container image
        if: hashFiles('Dockerfile') != ''
        run: docker build --provenance=false --sbom=false -t cutline:ci .

      - name: Trivy image scan
        if: hashFiles('Dockerfile') != ''
        uses: aquasecurity/trivy-action@cf5c088a69634cd13ccddc735d7926162c31f9a6 # v0.28.0
        with:
          scan-type: image
          image-ref: cutline:ci
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1
