# Syncs Cutline-owned 1Password item "GHCR pull cutline kubernetes" (homelab7) to Secret
# `cutline-regcred` (kubernetes.io/dockerconfigjson) for ghcr.io pulls. Cutline owns this
# item so it no longer references jpegs3's shared regcred. The item has a single text field
# labeled `.dockerconfigjson` (operator maps field labels -> Secret keys). The GHCR PAT value
# is currently copied from the shared homelab token; mint a Cutline-only GitHub PAT and update
# this item for full credential isolation. Refresh `spec.itemPath` if the item is recreated.
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: cutline-regcred
  annotations:
    operator.1password.io/auto-restart: 'true'
spec:
  itemPath: vaults/abcm7u74m6iahz5l5cytfl3tka/items/wbo7b5mldsiilh6oypvz7eatly
type: kubernetes.io/dockerconfigjson
