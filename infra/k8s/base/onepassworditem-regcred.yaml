# Syncs the "Cutline-PROD" 1Password item (homelab7) to Secret `cutline-regcred`
# (kubernetes.io/dockerconfigjson) for ghcr.io pulls. One item holds all Cutline secrets:
# it also backs `cutline-app` (see onepassworditem-cutline-app.yaml). The item's
# `.dockerconfigjson` field supplies the pull creds; its `dotenv` field also syncs into this
# Secret as an unused extra key (harmless — kubelet only reads `.dockerconfigjson`). The GHCR
# PAT value is copied from the shared homelab token; mint a Cutline-only GitHub PAT for full
# credential isolation. Refresh `spec.itemPath` if the item is recreated in 1Password.
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: cutline-regcred
  annotations:
    operator.1password.io/auto-restart: 'true'
spec:
  itemPath: vaults/abcm7u74m6iahz5l5cytfl3tka/items/nzqatdqmjtjc4vgmszqznafsnm
type: kubernetes.io/dockerconfigjson
