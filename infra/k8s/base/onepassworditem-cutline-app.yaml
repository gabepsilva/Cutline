# Syncs 1Password item "Cutline-PROD" (homelab7) to Secret `cutline-app` (key `dotenv`).
# This single item holds all Cutline secrets: a `dotenv` field (KEY=value lines, mounted at
# /app/.env, Bun auto-loads at startup) plus a `.dockerconfigjson` field that also backs
# `cutline-regcred`. Both fields sync into this Secret, so `cutline-app` carries an unused
# `.dockerconfigjson` key too (harmless — the Deployment subPath-mounts only `dotenv`).
# `auto-restart` bounces pods when the value rotates. Refresh `spec.itemPath` if recreated.
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: cutline-app
  annotations:
    operator.1password.io/auto-restart: 'true'
spec:
  itemPath: vaults/abcm7u74m6iahz5l5cytfl3tka/items/nzqatdqmjtjc4vgmszqznafsnm
