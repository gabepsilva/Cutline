# Syncs 1Password item "Cutline-PROD" (homelab7) to Secret `cutline-app` (key `dotenv`).
# The item has one text field labeled `dotenv` holding KEY=value lines; the Deployment
# mounts it as /app/.env and Bun auto-loads it at startup. `auto-restart` bounces pods
# when the value rotates. Refresh `spec.itemPath` if the item is recreated in 1Password.
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: cutline-app
  annotations:
    operator.1password.io/auto-restart: 'true'
spec:
  itemPath: vaults/abcm7u74m6iahz5l5cytfl3tka/items/nzqatdqmjtjc4vgmszqznafsnm
