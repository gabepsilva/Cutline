# Suspended CronJob kept as a manual migration template (M7-01). Deploy-time
# migrations run via the Argo CD PreSync hook Job in migrate-prehook-job.yaml (T-13).
# Manual: `kubectl create job … --from=cronjob/cutline-migrate` after `set image`.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: cutline-migrate
  namespace: cutline
  labels:
    app.kubernetes.io/name: cutline
    app.kubernetes.io/component: migrate
spec:
  schedule: '0 0 1 1 *'
  suspend: true
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      ttlSecondsAfterFinished: 86400
      template:
        metadata:
          labels:
            app.kubernetes.io/name: cutline
            app.kubernetes.io/component: migrate
        spec:
          automountServiceAccountToken: false
          imagePullSecrets:
            - name: cutline-regcred
          restartPolicy: Never
          securityContext:
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: migrate
              image: ghcr.io/gabepsilva/cutline:bootstrap
              imagePullPolicy: IfNotPresent
              command: ['bun', '/app/scripts/migrate.mjs']
              env:
                - name: NODE_ENV
                  value: production
                - name: HOME
                  value: /tmp
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 500m
                  memory: 128Mi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                runAsNonRoot: true
                runAsUser: 1000
                runAsGroup: 1000
                capabilities:
                  drop:
                    - ALL
              volumeMounts:
                # Turso URL + token from dotenv only — no ConfigMap env (would win with file:).
                - name: app-dotenv
                  mountPath: /app/.env
                  subPath: dotenv
                  readOnly: true
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: app-dotenv
              secret:
                secretName: cutline-app
            - name: tmp
              emptyDir: {}
