apiVersion: apps/v1
kind: Deployment
metadata:
  name: cutline
  namespace: cutline
  labels:
    app.kubernetes.io/name: cutline
spec:
  replicas: 1
  minReadySeconds: 5
  progressDeadlineSeconds: 300
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: cutline
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cutline
    spec:
      automountServiceAccountToken: false
      # GHCR package is private — pull secret synced by 1Password operator (see README).
      imagePullSecrets:
        - name: cutline-regcred
      terminationGracePeriodSeconds: 30
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: cutline
          # Overlay/CD sets the real tag (kustomize images / `kubectl set image`).
          image: ghcr.io/gabepsilva/cutline:bootstrap
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: cutline-config
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 384Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            capabilities:
              drop:
                - ALL
          volumeMounts:
            # 1Password-synced Secret blob mounted as /app/.env. Bun auto-loads it at
            # startup (CWD is /app); ConfigMap env wins on conflicts for ORIGIN/PORT.
            # DATABASE_URL + DATABASE_AUTH_TOKEN come from dotenv (Turso). subPath mounts
            # don't live-update — `auto-restart` handles that.
            - name: app-dotenv
              mountPath: /app/.env
              subPath: dotenv
              readOnly: true
            # Writable scratch for bun cache (HOME=/tmp).
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: app-dotenv
          secret:
            secretName: cutline-app
        - name: tmp
          emptyDir: {}
