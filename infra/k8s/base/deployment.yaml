apiVersion: apps/v1
kind: Deployment
metadata:
  name: cutline
  namespace: cutline
  labels:
    app.kubernetes.io/name: cutline
spec:
  replicas: 1
  minReadySeconds: 5
  progressDeadlineSeconds: 300
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: cutline
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cutline
    spec:
      automountServiceAccountToken: false
      # GHCR package is private — pull secret synced by 1Password operator (see README).
      imagePullSecrets:
        - name: cutline-regcred
      terminationGracePeriodSeconds: 30
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: cutline
          # Overlay/CD sets the real tag (kustomize images / `kubectl set image`).
          image: ghcr.io/gabepsilva/cutline:bootstrap
          imagePullPolicy: IfNotPresent
          # Inline startup: load dotenv without overriding ConfigMap, then migrate +
          # server. Skips docker-entrypoint.sh so an older image cannot re-source
          # /app/.env and override DATABASE_URL (Turso keys in vault pre-#129).
          command: ['/bin/sh', '-ec']
          args:
            - |
              if [ -f /app/.env ]; then
                while IFS= read -r line || [ -n "$line" ]; do
                  [ -z "$line" ] && continue
                  [ "${line#\#}" != "$line" ] && continue
                  case "$line" in *=*) ;; *) continue ;; esac
                  key="${line%%=*}"
                  val="${line#*=}"
                  if ! printenv "$key" >/dev/null 2>&1; then
                    export "$key=$val"
                  fi
                done < /app/.env
              fi
              echo "[entrypoint] applying database migrations..."
              bun /app/scripts/migrate.mjs
              echo "[entrypoint] starting Cutline on ${HOST:-0.0.0.0}:${PORT:-3000}"
              exec bun /app/build/index.js
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: cutline-config
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 384Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: app-dotenv
              mountPath: /app/.env
              subPath: dotenv
              readOnly: true
            # Writable scratch for the ephemeral SQLite DB + bun cache (HOME=/tmp).
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: app-dotenv
          secret:
            secretName: cutline-app
        - name: tmp
          emptyDir: {}
