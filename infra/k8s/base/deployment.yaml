apiVersion: apps/v1
kind: Deployment
metadata:
  name: cutline
  namespace: cutline
  labels:
    app.kubernetes.io/name: cutline
spec:
  replicas: 1
  minReadySeconds: 5
  progressDeadlineSeconds: 300
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: cutline
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cutline
    spec:
      automountServiceAccountToken: false
      # GHCR package is private — pull secret bootstrapped out-of-band (see README).
      imagePullSecrets:
        - name: cutline-regcred
      terminationGracePeriodSeconds: 30
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: cutline
          # Overlay/CD sets the real tag (kustomize images / `kubectl set image`).
          image: ghcr.io/gabepsilva/cutline:bootstrap
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: cutline-config
          env:
            - name: BETTER_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: cutline-app
                  key: BETTER_AUTH_SECRET
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 384Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            capabilities:
              drop:
                - ALL
          volumeMounts:
            # Writable scratch for the ephemeral SQLite DB + bun cache (HOME=/tmp).
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
