apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: cutline

resources:
  - ../../base

# CD updates the running Deployment with `kubectl set image` (T-12). This pins a
# concrete starting tag for `kubectl apply -k`; bump it (or let CD manage it) as
# new images are pushed to GHCR.
images:
  - name: ghcr.io/gabepsilva/cutline
    newTag: bootstrap
