apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: cutline

resources:
  - ../../base

# Authoritative prod image tag (T-13). deploy.yml commits images.newTag after each
# build; Argo CD syncs this overlay and rolls the Deployment.
images:
  - name: ghcr.io/gabepsilva/cutline
    newTag: 2026-06-30_81
