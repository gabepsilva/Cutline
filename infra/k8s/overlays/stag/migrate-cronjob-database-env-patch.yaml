apiVersion: batch/v1
kind: CronJob
metadata:
  name: cutline-migrate
spec:
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: migrate
              env:
                - name: DATABASE_URL
                  valueFrom:
                    configMapKeyRef:
                      name: cutline-config
                      key: DATABASE_URL
                - name: DATABASE_AUTH_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: cutline-app
                      key: stag-db-token
