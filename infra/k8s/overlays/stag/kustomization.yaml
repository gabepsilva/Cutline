apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: cutline-stag

resources:
  - ../../base

# Authoritative stag image tag. deploy.yml commits images.newTag after each build;
# Argo CD syncs this overlay and rolls the Deployment.
images:
  - name: ghcr.io/gabepsilva/cutline
    newTag: 2026-06-30_81

patches:
  - path: configmap-patch.yaml
    target:
      kind: ConfigMap
      name: cutline-config
  - path: ingress-patch.yaml
    target:
      kind: Ingress
      name: cutline
  - path: certificate-patch.yaml
    target:
      kind: Certificate
      name: cutline-tls
  - path: deployment-database-auth-patch.yaml
    target:
      kind: Deployment
      name: cutline
  - path: worker-database-auth-patch.yaml
    target:
      kind: Deployment
      name: cutline-worker
  - path: migrate-database-env-patch.yaml
    target:
      kind: Job
      name: cutline-migrate-hook
  - path: migrate-cronjob-database-env-patch.yaml
    target:
      kind: CronJob
      name: cutline-migrate
  - patch: |
      - op: remove
        path: /metadata/annotations/cert-manager.io~1cluster-issuer
    target:
      group: networking.k8s.io
      version: v1
      kind: Ingress
      name: cutline
