# One-time registration on tk8s:
#   kubectl apply -f infra/k8s/argocd/cutline-prod-app.yaml
#
# Public repo — no repo-creds required. Argo tracks infra/k8s/overlays/prod; CI
# commits images.newTag and Argo syncs the cluster (T-13).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cutline-prod
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/gabepsilva/Cutline
    targetRevision: master
    path: infra/k8s/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: cutline
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - ApplyOutOfSyncOnly=true
